version: '3.8'

services:
  # Backend Agent Service
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"


  # Frontend Dashboard Service
  # Falls dein Frontend im Unterordner 'src/frontend' liegt:
  web:
    build: ./src/frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
